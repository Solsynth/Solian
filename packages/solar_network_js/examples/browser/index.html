<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Solar Network JS Auth Example</title>
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        max-width: 600px;
        margin: 0 auto;
        padding: 20px;
        background: #f5f5f5;
      }
      .card {
        background: white;
        border-radius: 12px;
        padding: 20px;
        margin-bottom: 16px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      }
      h1 {
        margin: 0 0 8px 0;
        font-size: 24px;
      }
      h2 {
        margin: 0 0 12px 0;
        font-size: 18px;
      }
      label {
        display: block;
        margin-bottom: 4px;
        font-weight: 500;
      }
      input {
        width: 100%;
        padding: 10px;
        border: 1px solid #ddd;
        border-radius: 8px;
        font-size: 16px;
      }
      button {
        width: 100%;
        padding: 12px;
        border: none;
        border-radius: 8px;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        margin-top: 12px;
      }
      button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
      .btn-primary {
        background: #007aff;
        color: white;
      }
      .btn-secondary {
        background: #e5e5e5;
        color: #333;
      }
      .btn-success {
        background: #34c759;
        color: white;
      }
      .status {
        padding: 12px;
        border-radius: 8px;
        margin-top: 12px;
        font-family: monospace;
        font-size: 14px;
        white-space: pre-wrap;
        word-break: break-all;
      }
      .status.info {
        background: #e3f2fd;
        color: #1565c0;
      }
      .status.success {
        background: #e8f5e9;
        color: #2e7d32;
      }
      .status.error {
        background: #ffebee;
        color: #c62828;
      }
      .status.warning {
        background: #fff3e0;
        color: #ef6c00;
      }
      .row {
        display: flex;
        gap: 12px;
      }
      .row > * {
        flex: 1;
      }
      .divider {
        border-top: 1px solid #eee;
        margin: 20px 0;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Solar Network Auth</h1>
      <p>Authenticate with your Solar Network desktop app</p>
    </div>

    <div class="card">
      <h2>Settings</h2>
      <div class="row">
        <div>
          <label for="port">Port</label>
          <input type="text" id="port" value="40000" placeholder="40000" />
        </div>
        <div>
          <label for="appName">App Name</label>
          <input
            type="text"
            id="appName"
            value="MyWebApp"
            placeholder="MyWebApp"
          />
        </div>
      </div>
    </div>

    <div class="card">
      <h2>Authentication</h2>
      <button id="authBtn" class="btn-primary">1. Start Authentication</button>
      <div id="authStatus" class="status info" style="display: none"></div>
    </div>

    <div class="card">
      <h2>Test Token</h2>
      <button id="testBtn" class="btn-secondary" disabled>
        2. Fetch Account Info
      </button>
      <div id="testStatus" class="status info" style="display: none"></div>
    </div>

    <script type="module">
      import { WebAuthClient } from "@solarnetwork/js-auth";

      const client = new WebAuthClient();

      const portInput = document.getElementById("port");
      const appNameInput = document.getElementById("appName");
      const authBtn = document.getElementById("authBtn");
      const authStatus = document.getElementById("authStatus");
      const testBtn = document.getElementById("testBtn");
      const testStatus = document.getElementById("testStatus");

      let currentToken = null;

      function showStatus(element, message, type = "info") {
        element.style.display = "block";
        element.className = `status ${type}`;
        element.textContent = message;
      }

      function setLoading(button, loading) {
        button.disabled = loading;
        if (!button.dataset.originalText) {
          button.dataset.originalText = button.textContent;
        }
        button.textContent = loading
          ? "Loading..."
          : button.dataset.originalText;
      }

      async function signChallenge(challenge) {
        await new Promise((resolve) => setTimeout(resolve, 500));
        return `signed_${challenge}`;
      }

      authBtn.addEventListener("click", async () => {
        const port = parseInt(portInput.value, 10);
        const appName = appNameInput.value;

        if (!port || port < 1 || port > 65535) {
          showStatus(authStatus, "Please enter a valid port number", "error");
          return;
        }

        if (!appName) {
          showStatus(authStatus, "Please enter an app name", "error");
          return;
        }

        setLoading(authBtn, true);
        showStatus(
          authStatus,
          "Waiting for user to respond...\n\nThe Solar Network app should show a confirmation dialog.",
          "info",
        );

        try {
          const result = await client.authenticate({
            port,
            appName,
            signChallenge,
          });

          if (result.status === "challenge") {
            showStatus(authStatus, "Challenge received! Signing...", "info");
          } else if (result.status === "denied") {
            showStatus(authStatus, "Authentication denied by user", "warning");
            setLoading(authBtn, false);
          } else if (result.status === "success") {
            currentToken = result.token;
            showStatus(
              authStatus,
              `Authentication successful!\n\nToken: ${currentToken?.substring(0, 50)}...`,
              "success",
            );
            testBtn.disabled = false;
            setLoading(authBtn, false);
          } else {
            showStatus(authStatus, `Error: ${result.error}`, "error");
            setLoading(authBtn, false);
          }
        } catch (error) {
          showStatus(
            authStatus,
            `Connection failed: ${error.message}`,
            "error",
          );
          setLoading(authBtn, false);
        }
      });

      testBtn.addEventListener("click", async () => {
        const port = parseInt(portInput.value, 10);

        if (!currentToken) {
          showStatus(testStatus, "No token available", "error");
          return;
        }

        setLoading(testBtn, true);
        showStatus(testStatus, "Fetching account info...", "info");

        try {
          const result = await client.fetchAccountInfo({
            port,
            token: currentToken,
          });

          if (result.success) {
            showStatus(
              testStatus,
              `Account Info:\n\n${JSON.stringify(result.data, null, 2)}`,
              "success",
            );
          } else {
            showStatus(testStatus, `Failed: ${result.error}`, "error");
          }
        } catch (error) {
          showStatus(testStatus, `Error: ${error.message}`, "error");
        } finally {
          setLoading(testBtn, false);
        }
      });
    </script>
  </body>
</html>
