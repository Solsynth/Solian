id: dev.solsynth.solian
runtime: org.freedesktop.Platform
runtime-version: '24.08'
sdk: org.freedesktop.Sdk
command: island

finish-args:
  - --socket=wayland
  - --socket=fallback-x11
  - --device=dri
  - --share=network
  - --share=ipc

modules:
  # ── libsecret (needed by flutter_secure_storage) ──────────────
  - name: libsecret
    buildsystem: meson
    config-opts:
      - -Dintrospection=false
      - -Dmanpage=false
      - -Dgtk_doc=false
      - -Dselinux=false
    sources:
      - type: archive
        url: https://download.gnome.org/sources/libsecret/0.21/libsecret-0.21.6.tar.xz
        sha256: 6cb6c067874a6e6d08ce7cf07ad3f1a7fa2f6f0c0a1bc2496e7639be01c4a071
    cleanup:
      - /include
      - /lib/pkgconfig
      - /share

  # ── libdbusmenu-glib (needed by ayatana-appindicator) ─────────
  - name: libdbusmenu-glib
    buildsystem: meson
    config-opts:
      - -Ddocs=false
      - -Dtests=false
      - -Dintrospection=false
      - -Dgtk3=false
    sources:
      - type: archive
        url: https://github.com/AyatanaIndicators/libdbusmenu/archive/refs/tags/0.9.3.tar.gz
        sha256: 00b2e58c53a77f84d77d9c67fc8e9b97b5dcfdc6eba0f5a556edbf1d4b6a5020
    cleanup:
      - /include
      - /lib/pkgconfig
      - /share

  # ── libayatana-ido ────────────────────────────────────────────
  - name: libayatana-ido
    buildsystem: meson
    config-opts:
      - -Ddocs=false
      - -Dtests=false
      - -Dintrospection=false
      - -Dvapi=false
    sources:
      - type: archive
        url: https://github.com/AyatanaIndicators/ayatana-ido/archive/refs/tags/0.9.3.tar.gz
        sha256: e67819962a1aba597b0d1a8c8f823da199b28b2ab4db854a5aa9714a0bc1aea6
    cleanup:
      - /include
      - /lib/pkgconfig
      - /share

  # ── libayatana-indicator ──────────────────────────────────────
  - name: libayatana-indicator
    buildsystem: meson
    config-opts:
      - -Ddocs=false
      - -Dtests=false
      - -Dintrospection=false
      - -Dvapi=false
    sources:
      - type: archive
        url: https://github.com/AyatanaIndicators/ayatana-indicator/archive/refs/tags/0.9.4.tar.gz
        sha256: 11e07568cfa129fb87e50369bdb631aa1ac4b7e50bb526ae43a066812fac01e1
    cleanup:
      - /include
      - /lib/pkgconfig
      - /share

  # ── libayatana-appindicator ───────────────────────────────────
  - name: libayatana-appindicator
    buildsystem: meson
    config-opts:
      - -Ddocs=false
      - -Dtests=false
      - -Dintrospection=false
      - -Dvapi=false
      - -Dgtk3=true
    sources:
      - type: archive
        url: https://github.com/AyatanaIndicators/ayatana-appindicator/archive/refs/tags/0.5.93.tar.gz
        sha256: 3f567b8a1ee8b08a57d84b4bf3b8f168ea703dee3f6c61f8189973d6bb94e2fe
    cleanup:
      - /include
      - /lib/pkgconfig
      - /share

  # ── libmpv (needed by media_kit) ──────────────────────────────
  - name: mpv
    buildsystem: meson
    config-opts:
      - -Dlua=disabled
      - -Dlibplacebo=disabled
      - -Dvulkan=disabled
      - -Dzimg=disabled
      - -Dd3d11=disabled
      - -Ddrm=disabled
      - -Dopenal=disabled
      - -Djack=disabled
      - -Dpipewire=disabled
      - -Dpulse=disabled
      - -Dsdl2=disabled
      - -Duchardet=disabled
      - -Drubberband=disabled
      - -Dlcms2=enabled
      - -Dx11=enabled
      - -Dwayland=enabled
      - -Dgl-x11=enabled
      - -Dgl-wayland=enabled
      - -Degl-drm=disabled
      - -Dplain-gl=enabled
      - -Dtests=false
      - -Dmanpage-build=disabled
      - -Djavascript=disabled
      - -Dcplayer=false
      - -Dcdda=disabled
      - -Ddvbin=disabled
      - -Ddvdnav=disabled
      - -Dlibarchive=disabled
      - -Dlibass=enabled
      - -Dbluray=disabled
    sources:
      - type: archive
        url: https://github.com/mpv-player/mpv/archive/refs/tags/v0.39.0.tar.gz
        sha256: 2fc93b1ba660bd41967034c72e8ca7e19e19c18e36c9be082b41eac6b3805830
    cleanup:
      - /include
      - /lib/pkgconfig
      - /share

  # ── Solian app ────────────────────────────────────────────────
  - name: solian
    buildsystem: simple
    build-commands:
      - mkdir -p /app/bin
      - cp -r bundle/* /app/bin/
      - install -Dm644 dev.solsynth.solian.desktop /app/share/applications/dev.solsynth.solian.desktop
      - install -Dm644 dev.solsynth.solian.metainfo.xml /app/share/metainfo/dev.solsynth.solian.metainfo.xml
      - install -Dm644 dev.solsynth.solian.png /app/share/icons/hicolor/256x256/apps/dev.solsynth.solian.png
    sources:
      - type: dir
        path: ../../build/linux/x64/release/bundle
        dest: bundle
      - type: file
        path: dev.solsynth.solian.desktop
      - type: file
        path: dev.solsynth.solian.metainfo.xml
      - type: file
        path: dev.solsynth.solian.png
